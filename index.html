<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Krypto Journal</title>
    <style>
        :root { --bg: #000; --card: #111; --sol: #00e676; --sui: #00c4ff; --purp: #8269d9; --txt: #fff; }
        body { background: var(--bg); color: var(--txt); font-family: -apple-system, sans-serif; margin: 0; padding: 20px; padding-bottom: 60px; }
        h1 { background: linear-gradient(90deg, var(--sol), var(--sui)); -webkit-background-clip: text; color: transparent; text-align: center; font-size: 26px; margin-bottom: 25px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
        .card { background: var(--card); border-radius: 20px; padding: 18px; border: 1px solid #222; margin-bottom: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .label { color: #888; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
        .val { font-size: 28px; font-weight: 800; margin: 5px 0; }
        .bar-bg { background: #222; height: 8px; border-radius: 4px; width: 100%; margin: 10px 0; overflow: hidden; }
        .bar-fill { height: 100%; width: 0%; transition: width 1s ease; }
        select, input { background: #1a1a1a; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 10px; width: 100%; margin-top: 8px; font-size: 16px; box-sizing: border-box; outline: none; -webkit-appearance: none; }
        button { background: var(--purp); color: #fff; border: none; padding: 14px; border-radius: 10px; width: 100%; margin-top: 15px; font-weight: bold; font-size: 16px; }
        .history-table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 12px; }
        .history-table th { text-align: left; color: #555; padding-bottom: 8px; border-bottom: 1px solid #222; }
        .history-table td { padding: 12px 0; border-bottom: 1px solid #1a1a1a; }
        .tag { padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: bold; }
        .delete-btn { color: #ff3b30; font-weight: bold; padding: 5px 10px; font-size: 16px; }
    </style>
</head>
<body>
    <h1>Krypto Journal 📈</h1>

    <div class="card" style="border-left: 4px solid var(--sol)">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <div class="label">Solana (SOL)</div>
            <div id="sol-price" style="color:#888; font-size:13px;">$ --</div>
        </div>
        <div id="sol-total" class="val" style="color:var(--sol)">-- SOL</div>
        <div id="sol-usd" style="font-size: 16px; color: #aaa;">$ --</div>
        <div class="bar-bg"><div id="sol-bar" class="bar-fill" style="background:var(--sol); box-shadow: 0 0 10px var(--sol);"></div></div>
        <div id="sol-percent" style="text-align:right; font-size:12px; color:var(--sol)">0% von 700</div>
    </div>

    <div class="card" style="border-left: 4px solid var(--sui)">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <div class="label">Sui (SUI)</div>
            <div id="sui-price" style="color:#888; font-size:13px;">$ --</div>
        </div>
        <div id="sui-total" class="val" style="color:var(--sui)">-- SUI</div>
        <div id="sui-usd" style="font-size: 16px; color: #aaa;">$ --</div>
        <div class="bar-bg"><div id="sui-bar" class="bar-fill" style="background:var(--sui); box-shadow: 0 0 10px var(--sui);"></div></div>
        <div id="sui-percent" style="text-align:right; font-size:12px; color:var(--sui)">0% von 8.000</div>
    </div>

    <div class="card" style="border-color: var(--purp);">
        <div class="label" style="color:var(--purp)">Kauf hinzufügen</div>
        <select id="asset-input">
            <option value="SOL">Solana (SOL)</option>
            <option value="SUI">Sui (SUI)</option>
        </select>
        <div style="display:flex; gap:10px;">
            <input type="number" id="amount-input" placeholder="Menge" step="any">
            <input type="number" id="price-input" placeholder="Kurs $" step="any">
        </div>
        <input type="date" id="date-input">
        <button onclick="addTransaction()">In Journal speichern</button>
    </div>

    <div class="card">
        <div class="label">Historie</div>
        <table class="history-table">
            <thead>
                <tr><th>Asset</th><th>Menge</th><th>Kurs</th><th style="text-align:right">Aktion</th></tr>
            </thead>
            <tbody id="history-body"></tbody>
        </table>
    </div>

    <script>
        // Startdaten (Deine 22.3 SOL + der März Kauf)
        let txs = JSON.parse(localStorage.getItem('bochum_final')) || [
            {asset: 'SOL', date: '2026-03-02', amount: 6.636, price: 95.30},
            {asset: 'SOL', date: 'Start', amount: 22.3481, price: 0}
        ];

        async function update() {
            let sol = txs.filter(t => t.asset === 'SOL').reduce((s, t) => s + t.amount, 0);
            let sui = txs.filter(t => t.asset === 'SUI').reduce((s, t) => s + t.amount, 0);

            document.getElementById('sol-total').innerText = sol.toLocaleString('de-DE', {minimumFractionDigits: 3}) + ' SOL';
            document.getElementById('sui-total').innerText = sui.toLocaleString('de-DE') + ' SUI';

            const hb = document.getElementById('history-body');
            hb.innerHTML = '';
            
            // Umgekehrte Liste für neueste oben
            txs.slice().reverse().forEach((t, index) => {
                let realIndex = txs.length - 1 - index;
                hb.insertAdjacentHTML('beforeend', `<tr>
                    <td><span class="tag" style="color:${t.asset==='SOL'? 'var(--sol)':'var(--sui)'}">${t.asset}</span><br><small style="color:#444">${t.date}</small></td>
                    <td style="font-weight:bold; color:#fff">+${t.amount}</td>
                    <td style="color:#666">$${t.price > 0 ? t.price.toFixed(2) : '--'}</td>
                    <td style="text-align:right"><span class="delete-btn" onclick="deleteTx(${realIndex})">✕</span></td>
                </tr>`);
            });

            try {
                const r = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=solana,sui&vs_currencies=usd');
                const d = await r.json();
                
                const solP = d.solana.usd;
                const suiP = d.sui.usd;

                document.getElementById('sol-price').innerText = 'Live: $' + solP.toFixed(2);
                document.getElementById('sui-price').innerText = 'Live: $' + suiP.toFixed(2);
                document.getElementById('sol-usd').innerText = '$ ' + (sol * solP).toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
                document.getElementById('sui-usd').innerText = '$ ' + (sui * suiP).toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});

                let solProg = (sol / 700) * 100;
                let suiProg = (sui / 8000) * 100;
                
                document.getElementById('sol-bar').style.width = Math.min(solProg, 100) + '%';
                document.getElementById('sol-percent').innerText = solProg.toFixed(1) + '% von 700';
                document.getElementById('sui-bar').style.width = Math.min(suiProg, 100) + '%';
                document.getElementById('sui-percent').innerText = suiProg.toFixed(1) + '% von 8.000';
            } catch(e) { console.log("Preise konnten nicht geladen werden."); }
        }

        function addTransaction() {
            const asset = document.getElementById('asset-input').value;
            const amount = parseFloat(document.getElementById('amount-input').value);
            const price = parseFloat(document.getElementById('price-input').value) || 0;
            const date = document.getElementById('date-input').value || new Date().toISOString().split('T')[0];

            if(amount > 0) {
                txs.push({asset, date, amount, price});
                localStorage.setItem('bochum_final', JSON.stringify(txs));
                update();
                document.getElementById('amount-input').value = '';
                document.getElementById('price-input').value = '';
            }
        }

        function deleteTx(index) {
            if(confirm("Eintrag löschen?")) {
                txs.splice(index, 1);
                localStorage.setItem('bochum_final', JSON.stringify(txs));
                update();
            }
        }

        update();
        setInterval(update, 30000);
    </script>
</body>
</html>
