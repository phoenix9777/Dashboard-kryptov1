<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Krypto Journal V37</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #0b0e11; --card: #181a20; --sol: #00e676; --sui: #00c4ff; --purp: #8269d9; --txt: #fff; --red: #f6465d; }
        body { background: var(--bg); color: var(--txt); font-family: -apple-system, sans-serif; margin: 0; padding: 15px; padding-bottom: 60px; overflow-x: hidden; }
        .header { text-align: center; padding: 10px 0; border-bottom: 1px solid #2b2f36; margin-bottom: 15px; }
        .journal-title { font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: var(--purp); font-weight: 800; margin-bottom: 4px; }
        .alltime-val { font-size: 30px; font-weight: 800; }
        .perf-badge { display: inline-block; padding: 4px 12px; border-radius: 8px; font-weight: bold; font-size: 14px; margin-top: 8px; }
        .slider-container { width: 100%; overflow: hidden; position: relative; border-radius: 16px; background: var(--card); border: 1px solid #2b2f36; margin-bottom: 10px; }
        .slider-track { display: flex; transition: transform 0.4s ease-out; width: 500%; }
        .slide { width: 20%; padding: 18px; box-sizing: border-box; min-height: 250px; }
        .dots { text-align: center; margin-bottom: 15px; }
        .dot { height: 6px; width: 6px; background-color: #3d434d; border-radius: 50%; display: inline-block; margin: 0 3px; }
        .dot.active { width: 12px; background-color: var(--purp); border-radius: 3px; }
        .card { background: var(--card); border-radius: 16px; padding: 18px; margin-bottom: 15px; border: 1px solid #2b2f36; }
        .val { font-size: 22px; font-weight: 700; }
        .yield-label { font-size: 10px; color: #848e9c; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
        .bar-bg { background: #2b2f36; height: 10px; border-radius: 5px; margin-top: 6px; overflow: hidden; }
        .bar-fill { height: 100%; transition: width 1s ease; }
        input, select { background: #2b2f36; border: 1px solid #3d434d; color: #fff; padding: 12px; border-radius: 8px; width: 100%; margin-top: 8px; font-size: 16px; box-sizing: border-box; outline:none; }
        button { background: var(--purp); color: #fff; border: none; padding: 16px; border-radius: 12px; width: 100%; margin-top: 15px; font-weight: 800; }
        .history-table { width: 100%; border-collapse: collapse; font-size: 12px; }
        .history-table td { padding: 12px 0; border-bottom: 1px solid #2b2f36; }
        .btn-backup { background: #2b2f36; color: #848e9c; padding: 10px; font-size: 11px; border-radius: 8px; border: none; width: 48%; margin-top: 10px; }
        .edit-btn { color: var(--purp); font-weight: bold; margin-right: 10px; }
    </style>
</head>
<body>

    <div class="header">
        <div class="journal-title">Krypto Journal</div>
        <div id="total-val-usd" class="alltime-val">$ 0.00</div>
        <div id="total-perf-eur" class="perf-badge">-- €</div>
    </div>

    <div class="slider-container" id="slider">
        <div class="slider-track" id="track">
            <div class="slide"><div class="yield-label">Trend (3M)</div><div style="height:180px"><canvas id="monthChart"></canvas></div></div>
            <div class="slide"><div class="yield-label">Recovery (Allzeit)</div><div style="height:180px"><canvas id="alltimeChart"></canvas></div></div>
            <div class="slide">
                <div class="yield-label">Ziele</div>
                <div style="margin-top:20px">
                    <div style="display:flex; justify-content:space-between; font-size:12px"><span>SOL (700)</span><span id="sol-pct">0%</span></div>
                    <div class="bar-bg"><div id="sol-bar" class="bar-fill" style="background:var(--sol)"></div></div>
                    <div style="display:flex; justify-content:space-between; font-size:12px; margin-top:20px"><span>SUI (8k)</span><span id="sui-pct">0%</span></div>
                    <div class="bar-bg"><div id="sui-bar" class="bar-fill" style="background:var(--sui)"></div></div>
                </div>
            </div>
            <div class="slide">
                <div class="yield-label">Staking Ernte</div>
                <div id="sol-weekly-yield" style="font-size:26px; font-weight:bold; color:var(--sol); margin-top:10px;">0.0000 SOL</div>
                <div style="font-size:12px; color:#848e9c;">Ertrag pro Woche</div>
                <div style="margin-top:20px; font-size:12px; opacity:0.8; color:#848e9c;">
                    Alliance (6.29%): <span id="st-alliance" style="color:#fff">0.00</span><br>
                    Trust (5.63%): <span id="st-trust" style="color:#fff">0.00</span>
                </div>
            </div>
            <div class="slide">
                <div class="yield-label">Break-Even</div>
                <div style="background:#2b2f36; padding:12px; border-radius:12px; margin-top:10px; display:flex; justify-content:space-between;"><span>SOL:</span><span id="sol-be" style="color:var(--purp); font-weight:800;">$--</span></div>
                <div style="background:#2b2f36; padding:12px; border-radius:12px; margin-top:8px; display:flex; justify-content:space-between;"><span>SUI:</span><span id="sui-be" style="color:var(--purp); font-weight:800;">$--</span></div>
            </div>
        </div>
    </div>
    <div class="dots" id="dotBox"></div>

    <div class="card" style="border-left: 4px solid var(--sol)">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <div><div class="yield-label" style="color:var(--sol)">SOLANA</div><div id="sol-qty" class="val">-- SOL</div></div>
            <div style="text-align:right"><div id="sol-p-live" style="font-weight:bold;">$--</div></div>
        </div>
    </div>

    <div class="card" style="border-left: 4px solid var(--sui)">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <div><div class="yield-label" style="color:var(--sui)">SUI</div><div id="sui-qty" class="val">-- SUI</div></div>
            <div style="text-align:right"><div id="sui-p-live" style="font-weight:bold;">$--</div></div>
        </div>
    </div>

    <div class="card" style="border-top: 2px solid var(--purp)">
        <input type="date" id="tx-date">
        <select id="tx-asset"><option value="SOL">SOLANA</option><option value="SUI">SUI</option></select>
        <input type="number" id="tx-eur" placeholder="Investiert in €">
        <div style="display:flex; gap:10px;"><input type="number" id="tx-qty" placeholder="Menge"><input type="number" id="tx-price" placeholder="Kurs in $"></div>
        <select id="tx-node">
            <option value="none">Kein Staking</option>
            <option value="alliance">Capital Alliance (6.29%)</option>
            <option value="trust">Trust Nodes (5.63%)</option>
        </select>
        <button id="save-btn" onclick="saveTx()">JOURNAL SPEICHERN</button>
    </div>

    <div class="card"><table class="history-table"><tbody id="history-body"></tbody></table></div>

    <div style="display:flex; justify-content:space-between; margin-bottom: 30px;">
        <button class="btn-backup" onclick="exportData()">💾 BACKUP</button>
        <button class="btn-backup" onclick="importData()">🔄 RESTORE</button>
    </div>

    <script>
        const APR = { trust: 0.0563, alliance: 0.0629, none: 0 };
        const DB_KEY = 'krypto_v1';
        let txs = JSON.parse(localStorage.getItem(DB_KEY)) || [];
        let editIdx = -1;
        let chartM, chartA, currentSlide = 0;

        async function refresh() {
            try {
                const res = await fetch('https://min-api.cryptocompare.com/data/pricemulti?fsyms=SOL,SUI&tsyms=USD,EUR');
                const p = await res.json();
                const solP = p.SOL.USD, suiP = p.SUI.USD, eurR = p.SOL.USD / p.SOL.EUR;

                let sQ = txs.filter(t => t.asset === 'SOL').reduce((s,t) => s + t.amount, 0);
                let suQ = txs.filter(t => t.asset === 'SUI').reduce((s,t) => s + t.amount, 0);
                let invEur = txs.reduce((s,t) => s + (t.eur || 0), 0);
                let totalUsd = (sQ * solP) + (suQ * suiP);

                document.getElementById('total-val-usd').innerText = '$ ' + totalUsd.toLocaleString(undefined, {minimumFractionDigits: 2});
                document.getElementById('sol-qty').innerText = sQ.toFixed(4) + ' SOL';
                document.getElementById('sui-qty').innerText = suQ.toLocaleString() + ' SUI';
                document.getElementById('sol-p-live').innerText = '$' + solP.toFixed(2);
                document.getElementById('sui-p-live').innerText = '$' + suiP.toFixed(2);

                let diffEur = (totalUsd / eurR) - invEur;
                let perf = document.getElementById('total-perf-eur');
                perf.innerText = (diffEur >= 0 ? '+' : '-') + Math.abs(diffEur).toLocaleString() + ' € Allzeit';
                perf.style.color = diffEur >= 0 ? 'var(--sol)' : 'var(--red)';
                perf.style.backgroundColor = diffEur >= 0 ? 'rgba(0,230,118,0.1)' : 'rgba(246,70,93,0.1)';

                document.getElementById('sol-be').innerText = sQ > 0 ? '$ ' + ((invEur * eurR) / sQ).toFixed(2) : '$ --';
                document.getElementById('sol-bar').style.width = Math.min((sQ/700)*100, 100) + '%';
                document.getElementById('sol-pct').innerText = ((sQ/700)*100).toFixed(1) + '%';
                document.getElementById('sui-bar').style.width = Math.min((suQ/8000)*100, 100) + '%';
                document.getElementById('sui-pct').innerText = ((suQ/8000)*100).toFixed(1) + '%';

                let weekly = txs.reduce((s,t) => s + (t.amount * (APR[t.node] || 0) / 52), 0);
                document.getElementById('sol-weekly-yield').innerText = weekly.toFixed(4) + ' SOL';
                document.getElementById('st-alliance').innerText = txs.filter(t=>t.node==='alliance').reduce((s,t)=>s+t.amount,0).toFixed(2) + ' SOL';
                document.getElementById('st-trust').innerText = txs.filter(t=>t.node==='trust').reduce((s,t)=>s+t.amount,0).toFixed(2) + ' SOL';

                updateCharts(totalUsd);
                renderHist();
            } catch(e) {}
        }

        function renderHist() {
            const b = document.getElementById('history-body'); b.innerHTML = '';
            txs.slice().reverse().forEach((t, i) => {
                let idx = txs.length - 1 - i;
                let nLabel = t.node === 'alliance' ? ' (A)' : (t.node === 'trust' ? ' (T)' : '');
                b.innerHTML += `<tr><td><b>${t.asset}</b>${nLabel}<br><small>${t.date}</small></td><td>+${t.amount.toFixed(2)}<br><small>${t.eur}€</small></td><td style="text-align:right;"><span class="edit-btn" onclick="editTx(${idx})">EDIT</span><span style="color:var(--red);font-weight:bold;" onclick="delTx(${idx})">✕</span></td></tr>`;
            });
        }

        function saveTx() {
            const q = parseFloat(document.getElementById('tx-qty').value) || 0;
            if(q > 0) {
                const newTx = {
                    asset: document.getElementById('tx-asset').value,
                    eur: parseFloat(document.getElementById('tx-eur').value) || 0,
                    amount: q,
                    node: document.getElementById('tx-node').value,
                    date: document.getElementById('tx-date').value || new Date().toISOString().split('T')[0]
                };
                if(editIdx > -1) txs[editIdx] = newTx; else txs.push(newTx);
                localStorage.setItem(DB_KEY, JSON.stringify(txs));
                editIdx = -1;
                document.getElementById('save-btn').innerText = "JOURNAL SPEICHERN";
                refresh();
            }
        }

        function editTx(i) {
            const t = txs[i];
            editIdx = i;
            document.getElementById('tx-asset').value = t.asset;
            document.getElementById('tx-eur').value = t.eur;
            document.getElementById('tx-qty').value = t.amount;
            document.getElementById('tx-node').value = t.node || 'none';
            document.getElementById('tx-date').value = t.date;
            document.getElementById('save-btn').innerText = "ÄNDERUNG SPEICHERN";
            window.scrollTo({ top: 400, behavior: 'smooth' });
        }

        function updateCharts(cur) {
            const opt = { responsive: true, maintainAspectRatio: false, interaction: { intersect: false, mode: 'index' }, plugins: { legend: { display: false }, tooltip: { enabled: true } }, scales: { x: { ticks: { color: '#848e9c' } }, y: { ticks: { color: '#848e9c', font: { size: 9 } } } } };
            if(chartM) chartM.destroy();
            chartM = new Chart(document.getElementById('monthChart'), { type: 'line', data: { labels: ['Jan','Feb','Mär'], datasets: [{ data: [cur*0.8, cur*0.9, cur], borderColor: '#8269d9', fill: true, backgroundColor: 'rgba(130,105,217,0.1)', tension: 0.3 }] }, options: opt });
            if(chartA) chartA.destroy();
            chartA = new Chart(document.getElementById('alltimeChart'), { type: 'line', data: { labels: ['21','23','Jetzt'], datasets: [{ data: [10000, 1500, cur], borderColor: '#8269d9', fill: true, backgroundColor: 'rgba(130,105,217,0.1)', tension: 0.4 }] }, options: opt });
        }

        function delTx(i) { if(confirm('Löschen?')) { txs.splice(i,1); localStorage.setItem(DB_KEY, JSON.stringify(txs)); refresh(); } }
        function exportData() { navigator.clipboard.writeText(JSON.stringify(txs)).then(() => alert("Backup kopiert!")); }
        function importData() { const code = prompt("Daten einfügen:"); if(code) { try { txs = JSON.parse(code); localStorage.setItem(DB_KEY, JSON.stringify(txs)); refresh(); alert("Historie geladen!"); } catch(e) { alert("Format-Fehler!"); } } }

        let startX = 0; document.getElementById('slider').addEventListener('touchstart', e => startX = e.touches[0].clientX);
        document.getElementById('slider').addEventListener('touchend', e => {
            let diff = startX - e.changedTouches[0].clientX;
            if(Math.abs(diff) > 60) {
                if(diff > 0 && currentSlide < 4) currentSlide++; else if(diff < 0 && currentSlide > 0) currentSlide--;
                document.getElementById('track').style.transform = `translateX(-${currentSlide * 20}%)`;
                for(let i=0; i<5; i++) document.getElementById('dotBox').children[i].classList.toggle('active', i === currentSlide);
            }
        });
        const dotBox = document.getElementById('dotBox'); 
        for(let i=0; i<5; i++) dotBox.innerHTML += `<span class="dot ${i===0?'active':''}"></span>`;
        
        refresh(); setInterval(refresh, 25000);
    </script>
</body>
</html>
