<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Krypto Journal Real</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #0b0e11; --card: #181a20; --sol: #00e676; --sui: #00c4ff; --purp: #8269d9; --txt: #fff; --red: #f6465d; }
        body { background: var(--bg); color: var(--txt); font-family: -apple-system, sans-serif; margin: 0; padding: 15px; padding-bottom: 60px; }
        .header { text-align: center; padding: 20px 0; border-bottom: 1px solid #2b2f36; margin-bottom: 20px; }
        .alltime-val { font-size: 36px; font-weight: 800; color: #fff; }
        .perf-badge { display: inline-block; padding: 4px 12px; border-radius: 8px; font-weight: bold; font-size: 14px; margin-top: 8px; }
        .card { background: var(--card); border-radius: 16px; padding: 18px; margin-bottom: 15px; border: 1px solid #2b2f36; }
        .chart-container { height: 180px; margin-top: 10px; }
        .asset-row { display: flex; justify-content: space-between; align-items: center; }
        .qty { font-size: 22px; font-weight: 700; }
        .usd-val { color: #848e9c; font-size: 14px; }
        input, select { background: #2b2f36; border: 1px solid #3d434d; color: #fff; padding: 12px; border-radius: 8px; width: 100%; margin-top: 10px; font-size: 16px; box-sizing: border-box; }
        button { background: var(--purp); color: #fff; border: none; padding: 16px; border-radius: 12px; width: 100%; margin-top: 15px; font-weight: 800; font-size: 16px; }
        .history-item { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #2b2f36; font-size: 13px; }
    </style>
</head>
<body>

    <div class="header">
        <div class="alltime-label" style="font-size: 11px; color: #848e9c; letter-spacing: 1px;">GESAMTWERT (USD)</div>
        <div id="total-val-usd" class="alltime-val">$ 0.00</div>
        <div id="total-perf-eur" class="perf-badge">-- €</div>
    </div>

    <div class="card">
        <div style="font-size: 12px; color: #848e9c; margin-bottom: 10px;">RECOVERY CHART (ALLZEIT)</div>
        <div class="chart-container"><canvas id="recoveryChart"></canvas></div>
    </div>

    <div class="card" style="border-left: 4px solid var(--sol)">
        <div class="asset-row">
            <div>
                <div style="font-size: 12px; color: var(--sol); font-weight: 800;">SOLANA</div>
                <div id="sol-qty-display" class="qty">28.9841 SOL</div>
            </div>
            <div style="text-align: right">
                <div id="sol-price-live" style="font-weight: bold;">$--</div>
                <div id="sol-usd-total" class="usd-val">$--</div>
            </div>
        </div>
    </div>

    <div class="card" style="border-left: 4px solid var(--sui)">
        <div class="asset-row">
            <div>
                <div style="font-size: 12px; color: var(--sui); font-weight: 800;">SUI</div>
                <div id="sui-qty-display" class="qty">0 SUI</div>
            </div>
            <div style="text-align: right">
                <div id="sui-price-live" style="font-weight: bold;">$--</div>
                <div id="sui-usd-total" class="usd-val">$--</div>
            </div>
        </div>
    </div>

    <div class="card" style="border-top: 2px solid var(--purp)">
        <input type="date" id="tx-date">
        <select id="tx-asset"><option value="SOL">SOLANA</option><option value="SUI">SUI</option></select>
        <div style="display:flex; gap:10px;">
            <input type="number" id="tx-eur" placeholder="Invest €">
            <input type="number" id="tx-qty" placeholder="Menge">
        </div>
        <button onclick="saveTx()">JOURNAL AKTUALISIEREN</button>
    </div>

    <div id="history-box" class="card"></div>

    <script>
        // Deine EXAKTEN Daten
        let transactions = JSON.parse(localStorage.getItem('krypto_v17_real')) || [
            {asset: 'SOL', date: '2026-03-02', amount: 6.636, eur: 500},
            {asset: 'SOL', date: '2021-Start', amount: 22.3481, eur: 9500}
        ];

        let myChart;

        async function refresh() {
            try {
                const res = await fetch('https://min-api.cryptocompare.com/data/pricemulti?fsyms=SOL,SUI&tsyms=USD,EUR');
                const prices = await res.json();
                
                const sP = prices.SOL.USD;
                const suP = prices.SUI.USD;
                const eurRate = prices.SOL.EUR / prices.SOL.USD;

                let solSum = transactions.filter(t => t.asset === 'SOL').reduce((s, t) => s + t.amount, 0);
                let suiSum = transactions.filter(t => t.asset === 'SUI').reduce((s, t) => s + t.amount, 0);
                let totalInvestEur = transactions.reduce((s, t) => s + t.eur, 0);

                let solUsd = solSum * sP;
                let suiUsd = suiSum * suP;
                let totalUsd = solUsd + suiUsd;
                let totalEur = totalUsd * eurRate;

                // UI Fixes
                document.getElementById('total-val-usd').innerText = '$ ' + totalUsd.toLocaleString(undefined, {minimumFractionDigits: 2});
                document.getElementById('sol-qty-display').innerText = solSum.toLocaleString(undefined, {minimumFractionDigits: 4}) + ' SOL';
                document.getElementById('sui-qty-display').innerText = suiSum.toLocaleString() + ' SUI';
                document.getElementById('sol-price-live').innerText = '$' + sP.toFixed(2);
                document.getElementById('sui-price-live').innerText = '$' + suP.toFixed(2);
                document.getElementById('sol-usd-total').innerText = '$ ' + solUsd.toLocaleString();
                document.getElementById('sui-usd-total').innerText = '$ ' + suiUsd.toLocaleString();

                // Allzeit Kalkulation (Die ehrlichen 10k)
                let diffEur = totalEur - totalInvestEur;
                let perfEl = document.getElementById('total-perf-eur');
                perfEl.innerText = (diffEur >= 0 ? '+' : '-') + Math.abs(diffEur).toLocaleString(undefined, {minimumFractionDigits: 2}) + ' € Allzeit';
                perfEl.style.backgroundColor = diffEur >= 0 ? 'rgba(0, 230, 118, 0.2)' : 'rgba(246, 70, 93, 0.2)';
                perfEl.style.color = diffEur >= 0 ? 'var(--sol)' : 'var(--red)';

                updateChart(totalUsd);
                showHistory();
            } catch(e) { console.log("API Fehler"); }
        }

        function updateChart(current) {
            const ctx = document.getElementById('recoveryChart').getContext('2d');
            if (myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['2021', '2023', '2025', 'Jetzt'],
                    datasets: [{
                        data: [10000, 1200, 2400, current],
                        borderColor: '#8269d9',
                        borderWidth: 3,
                        tension: 0.4,
                        fill: true,
                        backgroundColor: 'rgba(130, 105, 217, 0.1)',
                        pointRadius: 0
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } },
                    scales: { x: { display: true, ticks: { color: '#848e9c' } }, y: { display: false } }
                }
            });
        }

        function showHistory() {
            const box = document.getElementById('history-box');
            box.innerHTML = '<div style="font-size: 11px; color: #848e9c; margin-bottom: 10px;">HISTORIE</div>';
            transactions.slice().reverse().forEach((t, i) => {
                let idx = transactions.length - 1 - i;
                box.innerHTML += `<div class="history-item">
                    <span><b>${t.asset}</b> <small style="color:#555">${t.date}</small></span>
                    <span>+${t.amount.toFixed(2)} <span style="color:var(--red); margin-left:10px" onclick="delTx(${idx})">✕</span></span>
                </div>`;
            });
        }

        function saveTx() {
            const asset = document.getElementById('tx-asset').value;
            const eur = parseFloat(document.getElementById('tx-eur').value) || 0;
            const amount = parseFloat(document.getElementById('tx-qty').value) || 0;
            const date = document.getElementById('tx-date').value || '01.04.';
            if(amount > 0) {
                transactions.push({asset, date, amount, eur});
                localStorage.setItem('krypto_v17_real', JSON.stringify(transactions));
                refresh();
                document.getElementById('tx-eur').value = '';
                document.getElementById('tx-qty').value = '';
            }
        }

        function delTx(i) { if(confirm('Eintrag löschen?')) { transactions.splice(i,1); localStorage.setItem('krypto_v17_real', JSON.stringify(transactions)); refresh(); } }

        refresh();
        setInterval(refresh, 25000);
    </script>
</body>
</html>
