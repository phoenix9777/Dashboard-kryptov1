<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Krypto Intelligence V70 ULTRA</title>
    <link rel="apple-touch-icon" href="https://img.icons8.com/fluency/180/diamond.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>

    <style>
        :root { --bg: #0b0e11; --card: #181a20; --sol: #00e676; --sui: #00c4ff; --purp: #8269d9; --txt: #fff; --red: #f6465d; --btc: #f7931a; --eth: #627eea; }
        body { background: var(--bg); color: var(--txt); font-family: -apple-system, sans-serif; margin: 0; padding: 10px; padding-bottom: 60px; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        .header { text-align: center; padding: 15px 0 10px 0; border-bottom: 1px solid #2b2f36; }
        .alltime-val { font-size: 32px; font-weight: 800; letter-spacing: -1px; }
        .perf-badge { display: inline-block; padding: 4px 12px; border-radius: 8px; font-weight: bold; font-size: 13px; margin-top: 5px; }
        .slider-container { width: 100%; overflow: hidden; border-radius: 20px; background: var(--card); border: 1px solid #2b2f36; margin: 10px 0; height: 460px; box-shadow: 0 8px 25px rgba(0,0,0,0.4); }
        .slider-track { display: flex; transition: transform 0.45s cubic-bezier(0.19, 1, 0.22, 1); width: 500%; height: 100%; }
        .slide { width: 20%; box-sizing: border-box; height: 100%; padding: 20px; display: flex; flex-direction: column; }
        .dots { text-align: center; margin-bottom: 15px; }
        .dot { height: 5px; width: 5px; background-color: #3d434d; border-radius: 50%; display: inline-block; margin: 0 3px; }
        .dot.active { width: 15px; background-color: var(--purp); border-radius: 3px; }
        .card { background: var(--card); border-radius: 18px; padding: 15px; margin-bottom: 10px; border: 1px solid #2b2f36; }
        .yield-label { font-size: 10px; color: #848e9c; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; font-weight: 700; }
        .intel-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 12px; align-items: center; }
        .status-pill { padding: 4px 10px; border-radius: 6px; font-weight: 800; font-size: 10px; text-transform: uppercase; color:#000; }
        input, select { background: #2b2f36; border: 1px solid #3d434d; color: #fff; padding: 12px; border-radius: 10px; width: 100%; margin-top: 5px; font-size: 16px; outline:none; }
        button { background: var(--purp); color: #fff; border: none; padding: 16px; border-radius: 12px; width: 100%; margin-top: 10px; font-weight: 800; }
        .news-item { font-size: 11px; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.03); display: flex; justify-content: space-between; align-items: center; gap: 8px; }
        .news-sentiment { font-size: 9px; font-weight: 900; padding: 2px 6px; border-radius: 4px; text-transform: uppercase; }
        .history-table { width: 100%; border-collapse: collapse; font-size: 11px; }
        .grid-half { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    </style>
</head>
<body>
    <div class="header" onclick="location.reload()">
        <div id="total-val-usd" class="alltime-val">$ 0.00</div>
        <div id="total-perf-eur" class="perf-badge">-- €</div>
    </div>

    <div class="slider-container" id="slider">
        <div class="slider-track" id="track">
            <div class="slide">
                <div><div class="yield-label">Market Trend (3M)</div><div style="height:140px"><canvas id="monthChart"></canvas></div></div>
                <div style="margin-top:20px; border-top: 1px solid #2b2f36; padding-top:15px;"><div class="yield-label">Recovery Path</div><div style="height:140px"><canvas id="alltimeChart"></canvas></div></div>
            </div>
            
            <div class="slide">
                <div class="yield-label">Ziele Fortschritt</div>
                <div style="margin-bottom:12px"><div style="display:flex; justify-content:space-between; font-size:11px"><span>SOL (700)</span><span id="sol-pct">0%</span></div><div style="background:#2b2f36;height:6px;border-radius:3px;margin:4px 0;"><div id="sol-bar" style="height:100%;background:var(--sol);width:0%;border-radius:3px;transition:1s;"></div></div></div>
                <div style="display:flex; justify-content:space-between; font-size:11px"><span>SUI (8k)</span><span id="sui-pct">0%</span></div><div style="background:#2b2f36;height:6px;border-radius:3px;margin:4px 0;"><div id="sui-bar" style="height:100%;background:var(--sui);width:0%;border-radius:3px;transition:1s;"></div></div>
                <div class="grid-half" style="margin-top:20px;">
                    <div style="background:rgba(255,255,255,0.03); padding:12px; border-radius:12px; text-align:center;"><div class="yield-label" style="color:var(--sol)">SOL Ernte</div><div id="sol-weekly-yield" style="font-size:16px; font-weight:800">0.0000</div></div>
                    <div style="background:rgba(255,255,255,0.03); padding:12px; border-radius:12px; text-align:center;"><div class="yield-label" style="color:var(--sui)">SUI Ernte</div><div id="sui-weekly-yield" style="font-size:16px; font-weight:800">0.00</div></div>
                </div>
            </div>

            <div class="slide">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                    <div class="yield-label">AI Analysis & Global News</div>
                    <select id="intel-asset-select" onchange="syncAndAnalyze()" style="width:auto; font-size:11px; padding:4px 10px; border-radius:8px; background:var(--card); border:1px solid var(--purp);">
                        <option value="BTC">BITCOIN</option>
                        <option value="ETH">ETHEREUM</option>
                        <option value="SOL">SOLANA</option>
                        <option value="SUI">SUI</option>
                    </select>
                </div>
                <div class="intel-row"><span>Trend Status:</span><span id="intel-trend" class="status-pill" style="background:#3d434d">SYNCING...</span></div>
                <div id="news-container" style="margin-top:15px; overflow-y:auto; flex-grow:1; mask-image: linear-gradient(to bottom, black 80%, transparent 100%);">
                    <div class="yield-label" id="news-ticker-label">BTC News Ticker</div>
                    <div id="news-list"><div class="news-item">Lade globale Krypto-Daten...</div></div>
                </div>
            </div>

            <div class="slide">
                <div class="yield-label">Prognose 2031</div>
                <div style="text-align:center; margin-top:20px;">
                    <div id="prog-sol" style="color:var(--sol); font-weight:800; font-size:28px;">0.00 SOL</div>
                    <div id="prog-sui" style="color:var(--sui); font-weight:800; font-size:28px;">0 SUI</div>
                    <div id="prog-value" style="font-size:42px; font-weight:900; color:var(--purp); margin: 20px 0; text-shadow: 0 0 15px rgba(130,105,217,0.4);">$ 0.00</div>
                    <div style="font-size:10px; color:#848e9c; letter-spacing:1px;">ZIEL-WERT BEI ATH (SOL $260 | SUI $5)</div>
                </div>
            </div>

            <div class="slide" style="padding:0"><div id="tradingview_chart" style="height: 100%; width: 100%;"></div></div>
        </div>
    </div>
    <div class="dots" id="dotBox"></div>

    <div class="card" style="border-top: 2px solid var(--purp);">
        <div class="grid-half"><input type="date" id="tx-date"><select id="tx-asset"><option value="SOL">SOLANA</option><option value="SUI">SUI</option></select></div>
        <div class="grid-half"><input type="number" id="tx-eur" placeholder="Invest €" oninput="calcQty()"><input type="number" id="tx-price" placeholder="Kurs $" oninput="calcQty()"></div>
        <input type="number" id="tx-qty" placeholder="Menge (Coins) - Auto">
        <button onclick="saveTx()">JOURNAL SPEICHERN</button>
    </div>

    <div class="card" style="padding:5px 15px;"><table class="history-table"><tbody id="history-body"></tbody></table></div>
    
    <button onclick="generateSteuerPDF()" style="background:#2b2f36; color:var(--sol); margin-bottom:10px; border:1px solid var(--sol);">📄 PDF STEUER-REPORT GENERIEREN</button>
    
    <div style="display:flex; justify-content:space-between; margin-bottom: 30px;">
        <button onclick="exportData()" style="background:#2b2f36; width:48%; font-size:11px; border:1px solid #3d434d;">💾 BACKUP</button>
        <button onclick="importData()" style="background:#2b2f36; width:48%; font-size:11px; border:1px solid #3d434d;">🔄 RESTORE</button>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        const APR = { alliance: 0.0629, trust: 0.0563, sui_staked: 0.048, none: 0 };
        const DB_KEY = 'krypto_v1';
        let txs = JSON.parse(localStorage.getItem(DB_KEY)) || [];
        let prices = { SOL: 0, SUI: 0, BTC: 0, ETH: 0, EUR: 0.94 };
        let historyPrice = { SOL: 0, SUI: 0, BTC: 0, ETH: 0 };
        let currentSlide = 0, startX = 0;

        function calcQty() {
            const e = parseFloat(document.getElementById('tx-eur').value) || 0;
            const k = parseFloat(document.getElementById('tx-price').value) || 0;
            if(e>0 && k>0) document.getElementById('tx-qty').value = ((e/prices.EUR)/k).toFixed(4);
        }

        async function fetchNews() {
            const asset = document.getElementById('intel-asset-select').value;
            document.getElementById('news-ticker-label').innerText = asset + " News Ticker";
            const list = document.getElementById('news-list');
            try {
                // Fetching Live News via CryptoPanic Proxy (Simuliert für Browser-Sicherheit)
                const res = await fetch(`https://news.treeofalpha.com/api/news?limit=6&text=${asset}`);
                const data = await res.json();
                list.innerHTML = '';
                data.forEach(n => {
                    const color = n.sentiment === 'bullish' ? 'var(--sol)' : (n.sentiment === 'bearish' ? 'var(--red)' : '#848e9c');
                    list.innerHTML += `<div class="news-item">
                        <span style="flex-grow:1">${n.title.substring(0,45)}...</span>
                        <span class="news-sentiment" style="color:${color}; border:1px solid ${color}">${n.sentiment || 'neutral'}</span>
                    </div>`;
                });
            } catch(e) { list.innerHTML = '<div class="news-item">Ticker aktuell offline...</div>'; }
        }

        function generateSteuerPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.setFillColor(11, 14, 17); doc.rect(0, 0, 210, 297, 'F');
            doc.setTextColor(130, 105, 217); doc.setFontSize(22); doc.text("Krypto Intelligence Steuer-Report", 14, 25);
            doc.setTextColor(255, 255, 255); doc.setFontSize(10); doc.text("Datum: " + new Date().toLocaleString(), 14, 35);
            
            const tableData = txs.map(t => [t.date, t.asset, t.amount, t.eur.toFixed(2) + " €", t.price ? "$" + t.price : "--"]);
            doc.autoTable({ head: [['Datum', 'Asset', 'Menge', 'Invest (€)', 'Kurs ($)']], body: tableData, startY: 45, theme: 'dark' });
            doc.save("Krypto_Steuer_Report.pdf");
        }

        function initLivePrices() {
            const ws = new WebSocket('wss://stream.binance.com:9443/ws/solusdt@trade/suiusdt@trade/btcusdt@trade/ethusdt@trade');
            ws.onmessage = (e) => {
                const d = JSON.parse(e.data); const p = parseFloat(d.p);
                if(d.s === 'SOLUSDT') prices.SOL = p; if(d.s === 'SUIUSDT') prices.SUI = p;
                if(d.s === 'BTCUSDT') prices.BTC = p; if(d.s === 'ETHUSDT') prices.ETH = p;
                updateUI(); updateIntelligence();
            };
            setInterval(fetchNews, 60000);
        }

        function updateIntelligence() {
            const asset = document.getElementById('intel-asset-select').value;
            const curPrice = prices[asset]; if(!curPrice) return;
            if(historyPrice[asset] === 0) historyPrice[asset] = curPrice;
            const trendEl = document.getElementById('intel-trend');
            const isBullish = curPrice >= historyPrice[asset];
            trendEl.innerText = isBullish ? 'BULLISH' : 'BEARISH';
            trendEl.style.background = isBullish ? 'var(--sol)' : 'var(--red)';
        }

        function syncAndAnalyze() { 
            initTV(`BINANCE:${document.getElementById('intel-asset-select').value}USDT`); 
            fetchNews();
        }

        function initTV(s) { 
            document.getElementById('tradingview_chart').innerHTML = ''; 
            new TradingView.widget({ "autosize": true, "symbol": s, "interval": "60", "theme": "dark", "container_id": "tradingview_chart", "hide_top_toolbar": true }); 
        }

        function updateUI() {
            let sQ=0, suQ=0, invE=0, sW=0, suW=0, fSol=0, fSui=0;
            txs.forEach(t => {
                let amount = parseFloat(t.amount)||0; let eur = parseFloat(t.eur)||0; invE += eur;
                let rate = APR[t.node]||0;
                if(t.asset === 'SOL') { sQ += amount; sW += (amount * rate / 52); fSol += (amount * Math.pow(1 + rate, 5)); }
                else if(t.asset === 'SUI') { suQ += amount; suW += (amount * rate / 52); fSui += (amount * Math.pow(1 + rate, 5)); }
            });
            document.getElementById('total-val-usd').innerText = '$ ' + (sQ * prices.SOL + suQ * prices.SUI).toLocaleString(undefined, {minimumFractionDigits: 2});
            let diffE = ((sQ * prices.SOL + suQ * prices.SUI) * prices.EUR) - invE;
            let perf = document.getElementById('total-perf-eur');
            perf.innerText = (invE > 0 ? (diffE >= 0 ? '+' : '-') + Math.abs(diffE).toLocaleString(undefined, {maximumFractionDigits:0}) + ' €' : '-- €');
            perf.style.color = diffE >= 0 ? 'var(--sol)' : 'var(--red)';
            document.getElementById('sol-weekly-yield').innerText = sW.toFixed(4);
            document.getElementById('sui-weekly-yield').innerText = suW.toFixed(2);
            document.getElementById('prog-sol').innerText = (fSol || sQ).toFixed(1) + ' SOL';
            document.getElementById('prog-sui').innerText = (fSui || suQ).toFixed(0) + ' SUI';
            document.getElementById('prog-value').innerText = '$' + ((fSol || sQ) * 260 + (fSui || suQ) * 5).toLocaleString(undefined, {maximumFractionDigits:0});
            document.getElementById('sol-pct').innerText = ((sQ/700)*100).toFixed(1) + '%';
            document.getElementById('sui-pct').innerText = ((suQ/8000)*100).toFixed(1) + '%';
            document.getElementById('sol-bar').style.width = Math.min((sQ/700)*100, 100) + '%';
            document.getElementById('sui-bar').style.width = Math.min((suQ/8000)*100, 100) + '%';
        }

        function saveTx() {
            const q = parseFloat(document.getElementById('tx-qty').value) || 0;
            if(q > 0) {
                const n = { asset: document.getElementById('tx-asset').value, eur: parseFloat(document.getElementById('tx-eur').value)||0, price: parseFloat(document.getElementById('tx-price').value)||0, amount: q, node: document.getElementById('tx-node').value, date: document.getElementById('tx-date').value || new Date().toISOString().split('T')[0] };
                txs.push(n); localStorage.setItem(DB_KEY, JSON.stringify(txs)); renderHist(); updateUI();
            }
        }

        function renderHist() {
            const b = document.getElementById('history-body'); b.innerHTML = '';
            txs.slice().reverse().forEach((t, i) => {
                b.innerHTML += `<tr><td><b>${t.asset}</b><br><small>${t.date}</small></td><td>+${t.amount}<br><small>$${t.price}</small></td><td style="text-align:right;"><span style="color:var(--red);" onclick="delTx(${txs.length-1-i})">✕</span></td></tr>`;
            });
        }

        function delTx(i) { if(confirm('Löschen?')) { txs.splice(i,1); localStorage.setItem(DB_KEY, JSON.stringify(txs)); renderHist(); updateUI(); } }
        function exportData() { navigator.clipboard.writeText(JSON.stringify(txs)).then(() => alert("Code kopiert!")); }
        function importData() { let c = prompt("Backup einfügen:"); if(c) { txs = JSON.parse(c); localStorage.setItem(DB_KEY, JSON.stringify(txs)); location.reload(); } }

        document.getElementById('slider').addEventListener('touchstart', e => startX = e.touches[0].clientX);
        document.getElementById('slider').addEventListener('touchend', e => {
            let d = startX - e.changedTouches[0].clientX;
            if(Math.abs(d) > 50) {
                if(d > 0 && currentSlide < 4) currentSlide++; else if(d < 0 && currentSlide > 0) currentSlide--;
                document.getElementById('track').style.transform = `translateX(-${currentSlide * 20}%)`;
                const dots = document.getElementById('dotBox').children;
                for(let i=0; i<5; i++) dots[i].classList.toggle('active', i === currentSlide);
            }
        });
        const dBox = document.getElementById('dotBox'); for(let i=0; i<5; i++) dBox.innerHTML += `<span class="dot ${i===0?'active':''}"></span>`;
        
        async function init() {
            try {
                const res = await fetch('https://min-api.cryptocompare.com/data/price?fsym=USD&tsyms=EUR');
                const d = await res.json(); prices.EUR = d.EUR;
            } catch(e) {}
            initLivePrices(); initTV('BINANCE:BTCUSDT'); fetchNews(); renderHist();
        }
        init();
    </script>
</body>
</html>
