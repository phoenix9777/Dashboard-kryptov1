<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Krypto Journal V46 FINAL</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #0b0e11; --card: #181a20; --sol: #00e676; --sui: #00c4ff; --purp: #8269d9; --txt: #fff; --red: #f6465d; }
        body { background: var(--bg); color: var(--txt); font-family: -apple-system, sans-serif; margin: 0; padding: 15px; padding-bottom: 60px; overflow-x: hidden; }
        .header { text-align: center; padding: 10px 0; border-bottom: 1px solid #2b2f36; margin-bottom: 15px; }
        .journal-title { font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: var(--purp); font-weight: 800; margin-bottom: 4px; }
        .alltime-val { font-size: 30px; font-weight: 800; }
        .perf-badge { display: inline-block; padding: 4px 12px; border-radius: 8px; font-weight: bold; font-size: 14px; margin-top: 8px; }
        .slider-container { width: 100%; overflow: hidden; position: relative; border-radius: 16px; background: var(--card); border: 1px solid #2b2f36; margin-bottom: 10px; }
        .slider-track { display: flex; transition: transform 0.4s ease-out; width: 600%; }
        .slide { width: 16.66%; padding: 18px; box-sizing: border-box; min-height: 250px; }
        .dots { text-align: center; margin-bottom: 15px; }
        .dot { height: 6px; width: 6px; background-color: #3d434d; border-radius: 50%; display: inline-block; margin: 0 3px; }
        .dot.active { width: 12px; background-color: var(--purp); border-radius: 3px; }
        .card { background: var(--card); border-radius: 16px; padding: 18px; margin-bottom: 15px; border: 1px solid #2b2f36; }
        .val { font-size: 22px; font-weight: 700; }
        .yield-label { font-size: 10px; color: #848e9c; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
        input, select { background: #2b2f36; border: 1px solid #3d434d; color: #fff; padding: 12px; border-radius: 8px; width: 100%; margin-top: 8px; font-size: 16px; box-sizing: border-box; outline:none; }
        button { background: var(--purp); color: #fff; border: none; padding: 16px; border-radius: 12px; width: 100%; margin-top: 15px; font-weight: 800; }
        .history-table { width: 100%; border-collapse: collapse; font-size: 12px; }
        .history-table td { padding: 12px 0; border-bottom: 1px solid #2b2f36; }
        .edit-btn { color: var(--purp); font-weight: bold; margin-right: 10px; }
    </style>
</head>
<body>
    <div class="header">
        <div class="journal-title">LIVE PORTFOLIO</div>
        <div id="total-val-usd" class="alltime-val">$ 0.00</div>
        <div id="total-perf-eur" class="perf-badge">-- €</div>
    </div>
    <div class="slider-container" id="slider">
        <div class="slider-track" id="track">
            <div class="slide"><div class="yield-label">Trend</div><div style="height:180px"><canvas id="monthChart"></canvas></div></div>
            <div class="slide"><div class="yield-label">Recovery</div><div style="height:180px"><canvas id="alltimeChart"></canvas></div></div>
            <div class="slide">
                <div class="yield-label">Ziele</div>
                <div style="margin-top:20px; font-size:12px">
                    SOL: <span id="sol-pct">0%</span><br><div style="background:#2b2f36;height:8px;border-radius:4px;margin:5px 0;"><div id="sol-bar" style="height:100%;background:var(--sol);width:0%;border-radius:4px;"></div></div>
                    SUI: <span id="sui-pct">0%</span><br><div style="background:#2b2f36;height:8px;border-radius:4px;margin:5px 0;"><div id="sui-bar" style="height:100%;background:var(--sui);width:0%;border-radius:4px;"></div></div>
                </div>
            </div>
            <div class="slide">
                <div class="yield-label">Wöchentliche Ernte</div>
                <div id="sol-weekly-yield" style="font-size:22px; font-weight:bold; color:var(--sol);">0.0000 SOL</div>
                <div style="font-size:10px; color:#848e9c; margin-bottom:10px;">Zuwachs SOL</div>
                <div style="font-size:11px; color:#848e9c;">
                    Alliance: <span id="st-alliance" style="color:#fff">0.0</span> | Trust: <span id="st-trust" style="color:#fff">0.0</span>
                </div>
            </div>
            <div class="slide">
                <div class="yield-label">Break-Even</div>
                <div style="background:#2b2f36; padding:12px; border-radius:12px; margin-top:10px; display:flex; justify-content:space-between;"><span>SOL:</span><span id="sol-be" style="color:var(--purp); font-weight:800;">$--</span></div>
            </div>
            <div class="slide">
                <div class="yield-label">Ausblick (5 Jahre)</div>
                <div id="prog-sol" style="color:var(--sol); font-weight:bold; font-size:20px; margin-top:10px;">0.00 SOL</div>
                <div style="font-size:11px; color:#848e9c;">Inklusive Zinseszins</div>
                <div id="prog-value" style="font-size:24px; font-weight:800; color:var(--purp); margin-top:15px;">$ 0.00</div>
                <div style="font-size:11px; color:#848e9c;">Wert bei SOL ATH ($260)</div>
            </div>
        </div>
    </div>
    <div class="dots" id="dotBox"></div>
    <div class="card" style="border-left: 4px solid var(--sol)"><div style="display:flex; justify-content:space-between;"><div><div class="yield-label" style="color:var(--sol)">SOLANA</div><div id="sol-qty" class="val">-- SOL</div></div><div id="sol-p-live" style="font-weight:bold;">$--</div></div></div>
    <div class="card" style="border-top: 2px solid var(--purp)">
        <input type="date" id="tx-date">
        <select id="tx-asset"><option value="SOL">SOLANA</option><option value="SUI">SUI</option></select>
        <input type="number" id="tx-eur" placeholder="Investiert in €">
        <input type="number" id="tx-qty" placeholder="Menge">
        <select id="tx-node"><option value="none">Kein Staking</option><option value="alliance">Alliance (6.29%)</option><option value="trust">Trust Nodes (5.63%)</option></select>
        <button onclick="saveTx()" id="save-btn">SPEICHERN</button>
    </div>
    <div class="card"><table class="history-table"><tbody id="history-body"></tbody></table></div>
    <div style="display:flex; justify-content:space-between; margin-bottom: 30px;">
        <button onclick="exportData()" style="background:#2b2f36; width:48%;">BACKUP</button>
        <button onclick="importData()" style="background:#2b2f36; width:48%;">RESTORE</button>
    </div>
    <script>
        const APR = { trust: 0.0563, alliance: 0.0629, none: 0 };
        const DB_KEY = 'krypto_v1';
        let txs = JSON.parse(localStorage.getItem(DB_KEY)) || [];
        let prices = { SOL: 0, EUR: 0.94 };
        let editIdx = -1, startX = 0, currentSlide = 0;

        function initLivePrices() {
            const ws = new WebSocket('wss://stream.binance.com:9443/ws/solusdt@trade');
            ws.onmessage = (e) => { const d = JSON.parse(e.data); prices.SOL = parseFloat(d.p); updateUI(); };
        }

        function updateUI() {
            if (prices.SOL === 0) return;
            let sQ = 0, invE = 0, sW = 0, fSol = 0, sAl = 0, sTr = 0;
            txs.forEach(t => {
                let amount = parseFloat(t.amount) || 0;
                invE += (parseFloat(t.eur) || 0);
                if(t.asset === 'SOL') {
                    sQ += amount;
                    let rate = APR[t.node] || 0;
                    sW += (amount * rate / 52);
                    fSol += (amount * Math.pow(1 + rate, 5));
                    if(t.node === 'alliance') sAl += amount;
                    if(t.node === 'trust') sTr += amount;
                }
            });
            document.getElementById('total-val-usd').innerText = '$ ' + (sQ * prices.SOL).toLocaleString(undefined, {minimumFractionDigits: 2});
            let diffE = (sQ * prices.SOL * prices.EUR) - invE;
            let perf = document.getElementById('total-perf-eur');
            perf.innerText = (diffE >= 0 ? '+' : '-') + Math.abs(diffE).toLocaleString() + ' € Allzeit';
            perf.style.color = diffE >= 0 ? 'var(--sol)' : 'var(--red)';
            document.getElementById('sol-qty').innerText = sQ.toFixed(4) + ' SOL';
            document.getElementById('sol-p-live').innerText = '$' + prices.SOL.toFixed(2);
            document.getElementById('sol-be').innerText = sQ > 0 ? '$ ' + ((invE / prices.EUR) / sQ).toFixed(2) : '$ --';
            document.getElementById('sol-weekly-yield').innerText = sW.toFixed(4) + ' SOL';
            document.getElementById('st-alliance').innerText = sAl.toFixed(1);
            document.getElementById('st-trust').innerText = sTr.toFixed(1);
            document.getElementById('prog-sol').innerText = fSol.toFixed(2) + ' SOL';
            document.getElementById('prog-value').innerText = '$ ' + (fSol * 260).toLocaleString(undefined, {maximumFractionDigits:0});
            document.getElementById('sol-bar').style.width = Math.min((sQ/700)*100, 100) + '%';
            document.getElementById('sol-pct').innerText = ((sQ/700)*100).toFixed(1) + '%';
        }

        function renderHist() {
            const b = document.getElementById('history-body'); b.innerHTML = '';
            txs.slice().reverse().forEach((t, i) => {
                let idx = txs.length - 1 - i;
                b.innerHTML += `<tr><td><b>${t.asset}</b> (${t.node})<br><small>${t.date}</small></td><td>+${parseFloat(t.amount).toFixed(2)}<br><small>${t.eur}€</small></td><td style="text-align:right;"><span class="edit-btn" onclick="editTx(${idx})">EDIT</span><span style="color:var(--red);" onclick="delTx(${idx})">✕</span></td></tr>`;
            });
        }

        function saveTx() {
            const q = parseFloat(document.getElementById('tx-qty').value) || 0;
            if(q > 0) {
                const n = { asset: document.getElementById('tx-asset').value, eur: parseFloat(document.getElementById('tx-eur').value) || 0, amount: q, node: document.getElementById('tx-node').value, date: document.getElementById('tx-date').value || new Date().toISOString().split('T')[0] };
                if(editIdx > -1) txs[editIdx] = n; else txs.push(n);
                localStorage.setItem(DB_KEY, JSON.stringify(txs));
                editIdx = -1; document.getElementById('save-btn').innerText = "SPEICHERN";
                renderHist(); updateUI();
            }
        }

        function editTx(i) {
            const t = txs[i]; editIdx = i;
            document.getElementById('tx-asset').value = t.asset; document.getElementById('tx-eur').value = t.eur; document.getElementById('tx-qty').value = t.amount;
            document.getElementById('tx-node').value = t.node || 'none'; document.getElementById('tx-date').value = t.date;
            document.getElementById('save-btn').innerText = "ÄNDERUNG SPEICHERN";
        }

        function delTx(i) { if(confirm('Löschen?')) { txs.splice(i,1); localStorage.setItem(DB_KEY, JSON.stringify(txs)); renderHist(); updateUI(); } }
        function exportData() { navigator.clipboard.writeText(JSON.stringify(txs)).then(() => alert("Kopiert!")); }
        function importData() { 
            let c = prompt("Backup einfügen:"); 
            if(c) { 
                try {
                    // BRUTALE REINIGUNG DES TEXTES
                    c = c.replace(/[\u201C\u201D\u2018\u2019]/g, '"').trim();
                    txs = JSON.parse(c);
                    localStorage.setItem(DB_KEY, JSON.stringify(txs)); 
                    location.reload(); 
                } catch(e) { alert("Fehler! Kopiere den Text nochmal neu."); }
            } 
        }

        document.getElementById('slider').addEventListener('touchstart', e => startX = e.touches[0].clientX);
        document.getElementById('slider').addEventListener('touchend', e => {
            let d = startX - e.changedTouches[0].clientX;
            if(Math.abs(d) > 60) {
                if(d > 0 && currentSlide < 5) currentSlide++; else if(d < 0 && currentSlide > 0) currentSlide--;
                document.getElementById('track').style.transform = `translateX(-${currentSlide * 16.66}%)`;
                for(let i=0; i<6; i++) document.getElementById('dotBox').children[i].classList.toggle('active', i === currentSlide);
            }
        });
        const dBox = document.getElementById('dotBox'); for(let i=0; i<6; i++) dBox.innerHTML += `<span class="dot ${i===0?'active':''}"></span>`;
        initLivePrices(); renderHist();
    </script>
</body>
</html>
